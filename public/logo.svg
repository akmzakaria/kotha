<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Stylish talking lip design -->
  <defs>
    <linearGradient id="lipGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B9D;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E63E6D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C44569;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="highlightGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </linearGradient>
  </defs>
  
  <!-- Upper lip - talking position (slightly open) -->
  <path d="M 256 200 Q 200 175 150 190 Q 115 205 105 235 Q 150 215 200 225 Q 230 230 256 225 Q 282 230 312 225 Q 362 215 407 235 Q 397 205 362 190 Q 312 175 256 200 Z" 
        fill="url(#lipGradient)" 
        stroke="#A0153E" 
        stroke-width="4"
        stroke-linejoin="round"/>
  
  <!-- Lower lip - talking position -->
  <path d="M 105 235 Q 115 290 150 325 Q 200 355 256 360 Q 312 355 362 325 Q 397 290 407 235 Q 362 270 312 282 Q 282 287 256 282 Q 230 287 200 282 Q 150 270 105 235 Z" 
        fill="url(#lipGradient)" 
        stroke="#A0153E" 
        stroke-width="4"
        stroke-linejoin="round"/>
  
  <!-- Highlight on upper lip for glossy effect -->
  <ellipse cx="256" cy="210" rx="90" ry="18" fill="url(#highlightGradient)" opacity="0.8"/>
  
  <!-- Lip separation line (mouth opening) -->
  <path d="M 105 235 Q 150 245 200 250 Q 230 252 256 250 Q 282 252 312 250 Q 362 245 407 235" 
        stroke="#8B0000" 
        stroke-width="3" 
        fill="none"
        stroke-linecap="round"/>
  
  <!-- Inner mouth shadow -->
  <ellipse cx="256" cy="245" rx="80" ry="8" fill="#8B0000" opacity="0.3"/>
  
  <!-- Subtle teeth hint -->
  <rect x="236" y="238" width="40" height="8" rx="2" fill="#FFFFFF" opacity="0.4"/>
</svg>
